# Deployment configuration for Gmail send-as aliases functionality
# File: docker-compose.email-send-as.yml

version: '3.8'

services:
  # Main application with email send-as support
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # Existing environment variables
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - FRONTEND_URL=${FRONTEND_URL}
      - ADMIN_FRONTEND_URL=${ADMIN_FRONTEND_URL}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      
      # Email OAuth configuration (NEW)
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_OAUTH_REDIRECT_URI=${GOOGLE_OAUTH_REDIRECT_URI}
      - GOOGLE_OAUTH_SCOPES=${GOOGLE_OAUTH_SCOPES:-https://www.googleapis.com/auth/gmail.readonly https://www.googleapis.com/auth/gmail.send https://www.googleapis.com/auth/gmail.settings.basic openid email profile}
      
      - MICROSOFT_CLIENT_ID=${MICROSOFT_CLIENT_ID}
      - MICROSOFT_CLIENT_SECRET=${MICROSOFT_CLIENT_SECRET}
      - MICROSOFT_OAUTH_REDIRECT_URI=${MICROSOFT_OAUTH_REDIRECT_URI}
      - MICROSOFT_OAUTH_SCOPES=${MICROSOFT_OAUTH_SCOPES:-offline_access https://graph.microsoft.com/Mail.Read https://graph.microsoft.com/Mail.Send https://graph.microsoft.com/User.Read}
      
      - EMAIL_OAUTH_STATE_SECRET=${EMAIL_OAUTH_STATE_SECRET}
      
      # Email service configuration
      - EMAIL_SYNC_INTERVAL=${EMAIL_SYNC_INTERVAL:-2} # minutes
      - EMAIL_BATCH_SIZE=${EMAIL_BATCH_SIZE:-25}
      - EMAIL_MAX_RETRIES=${EMAIL_MAX_RETRIES:-5}
      - EMAIL_RETRY_DELAY=${EMAIL_RETRY_DELAY:-5000} # milliseconds
      
      # Rate limiting
      - EMAIL_RATE_LIMIT_PER_MINUTE=${EMAIL_RATE_LIMIT_PER_MINUTE:-60}
      - EMAIL_RATE_LIMIT_BURST=${EMAIL_RATE_LIMIT_BURST:-10}
      
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - app-network

  # Admin interface
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile.admin
    environment:
      - REACT_APP_ADMIN_API_URL=${ADMIN_API_URL:-http://localhost:3100}
      - REACT_APP_TENANT_API_URL=${TENANT_API_URL:-http://localhost:3200}
    ports:
      - "5173:5173"
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - app-network

  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-replypilot}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis for caching and queues
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
      - admin
    restart: unless-stopped
    networks:
      - app-network

  # Email sync worker (background process)
  email-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      
      # Email OAuth configuration
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - MICROSOFT_CLIENT_ID=${MICROSOFT_CLIENT_ID}
      - MICROSOFT_CLIENT_SECRET=${MICROSOFT_CLIENT_SECRET}
      - EMAIL_OAUTH_STATE_SECRET=${EMAIL_OAUTH_STATE_SECRET}
      
      # Worker configuration
      - EMAIL_SYNC_INTERVAL=${EMAIL_SYNC_INTERVAL:-2}
      - EMAIL_BATCH_SIZE=${EMAIL_BATCH_SIZE:-25}
      - EMAIL_WORKER_CONCURRENCY=${EMAIL_WORKER_CONCURRENCY:-5}
      
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - app-network

volumes:
  postgres_data:
  redis_data:

networks:
  app-network:
    driver: bridge
