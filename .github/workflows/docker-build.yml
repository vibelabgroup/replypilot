name: Build and Push Docker Images

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  IMAGE_NAME: vibelabgroup/replypilot

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    - name: Build and push API image
      uses: docker/build-push-action@v5
      with:
        context: ./server
        file: ./server/Dockerfile
        push: true
        tags: |
          ${{ env.DOCKER_USERNAME }}/replypilot-api:latest
          ${{ env.DOCKER_USERNAME }}/replypilot-api:${{ github.sha }}
        
    - name: Build and push Admin API image
      uses: docker/build-push-action@v5
      with:
        context: ./server
        file: ./server/Dockerfile.admin
        push: true
        tags: |
          ${{ env.DOCKER_USERNAME }}/replypilot-admin-api:latest
          ${{ env.DOCKER_USERNAME }}/replypilot-admin-api:${{ github.sha }}
        
    - name: Build and push Worker image
      uses: docker/build-push-action@v5
      with:
        context: ./server
        file: ./server/Dockerfile.worker
        push: true
        tags: |
          ${{ env.DOCKER_USERNAME }}/replypilot-worker:latest
          ${{ env.DOCKER_USERNAME }}/replypilot-worker:${{ github.sha }}
        
    - name: Build and push Frontend image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.frontend
        push: true
        tags: |
          ${{ env.DOCKER_USERNAME }}/replypilot-frontend:latest
          ${{ env.DOCKER_USERNAME }}/replypilot-frontend:${{ github.sha }}
        
    - name: Build and push Admin Frontend image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.admin-frontend
        push: true
        tags: |
          ${{ env.DOCKER_USERNAME }}/replypilot-admin-frontend:latest
          ${{ env.DOCKER_USERNAME }}/replypilot-admin-frontend:${{ github.sha }}
