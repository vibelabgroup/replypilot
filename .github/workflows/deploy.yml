name: Deploy to Hostinger VPS

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # Manual trigger from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.8.0
      with:
        ssh-private-key: ${{ secrets.VPS_SSH_KEY }}
        
    - name: Add VPS to known hosts
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
      
    - name: Sync code to VPS
      run: |
        # Sync files to VPS (excluding unnecessary files)
        rsync -avz --delete \
          --exclude='.git' \
          --exclude='.github' \
          --exclude='node_modules' \
          --exclude='.env' \
          --exclude='dist' \
          --exclude='*.md' \
          --exclude='.env.example' \
          --exclude='.env.local' \
          -e "ssh -o StrictHostKeyChecking=no" \
          ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/root/estatify/
      
    - name: Deploy on VPS
      run: |
        ssh -o StrictHostKeyChecking=no \
          ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
          "cd /root/estatify && \
           echo '${{ secrets.ENV_FILE }}' > .env && \
           docker compose down && \
           docker compose up -d --build && \
           docker system prune -f && \
           docker compose ps"
      
    - name: Health check
      run: |
        sleep 10
        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://estatify.ai/health || echo "000")
        if [ "$HTTP_CODE" = "200" ]; then
          echo "✅ Deployment successful! Health check passed."
          exit 0
        else
          echo "⚠️ Health check returned HTTP $HTTP_CODE"
          echo "Check manually: https://estatify.ai"
          exit 0  # Don't fail the workflow, just warn
        fi
